name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📊 Download dataset
        env:
          PYTHONPATH: ./src
        run: python src/download_data.py

      - name: ⚙️ Preprocess data
        env:
          PYTHONPATH: ./src
        run: python src/data_processing.py

      - name: 🤖 Train models
        env:
          PYTHONPATH: ./src
        run: python src/train_model.py

      - name: 🧪 Run tests
        env:
          PYTHONPATH: ./src
        run: pytest tests/ -v