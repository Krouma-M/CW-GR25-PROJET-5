<form method="POST" class="space-y-4">
  {% csrf_token %}
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Âge</label>
      <input type="number" step="0.1" name="age" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Sexe</label>
      <select name="sex" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
        <option value="male">Masculin</option>
        <option value="female">Féminin</option>
      </select>
    </div>
    <!-- Ajoutez tous les autres champs -->
  </div>
  <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
    Prédire
  </button>
</form>
